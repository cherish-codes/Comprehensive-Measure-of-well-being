<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Well-Being HDI Predictor</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f4f8; margin: 0; padding: 40px; }
        .wrapper { max-width: 600px; background: white; margin: 0 auto; padding: 35px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; }
        h1 { color: #1a365d; margin-bottom: 5px; }
        p { color: #64748b; margin-bottom: 30px; }
        .input-box { text-align: left; margin-bottom: 18px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; color: #334155; }
        input[type="number"] { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        input[type="number"]:focus { border-color: #3b82f6; outline: none; }
        button { background-color: #2563eb; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; width: 100%; border-radius: 6px; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        button:hover { background-color: #1d4ed8; }
        .output-display { margin-top: 30px; padding: 15px; background-color: #eff6ff; border-left: 5px solid #2563eb; font-size: 18px; font-weight: bold; color: #1e40af; border-radius: 4px; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>Human Development Index Predictor</h1>
    <p>Enter country statistics to evaluate regional well-being scores.</p>
    
    <form action="/predict" method="POST">
        <div class="input-box">
            <label for="life_exp">Life Expectancy at Birth (Years):</label>
            <input type="number" step="0.01" name="life_exp" placeholder="e.g., 75.4" required>
        </div>
        <div class="input-box">
            <label for="exp_school">Expected Years of Schooling (Years):</label>
            <input type="number" step="0.01" name="exp_school" placeholder="e.g., 14.2" required>
        </div>
        <div class="input-box">
            <label for="mean_school">Mean Years of Schooling (Years):</label>
            <input type="number" step="0.01" name="mean_school" placeholder="e.g., 9.8" required>
        </div>
        <div class="input-box">
            <label for="gni">Gross National Income (GNI) Per Capita:</label>
            <input type="number" step="0.01" name="gni" placeholder="e.g., 22000" required>
        </div>
        <button type="submit">Predict Well-Being Index</button>
    </form>

    {% if prediction_text %}
        <div class="output-display">
            {{ prediction_text }}
        </div>
    {% endif %}
</div>

</body>
</html>
